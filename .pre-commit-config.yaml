repos:
- repo: https://github.com/astral-sh/ruff-pre-commit
  # Ruff version.
  rev: v0.11.2
  hooks:
    # Run the linter.
    - id: ruff
      args: [ --fix ]
    # Run the formatter.
    - id: ruff-format

- repo: local
  hooks:
    - id: ty
      name: Run ty type checker
      entry: uv run ty check .
      language: system
      types: [python]
      pass_filenames: false # Prevents passing only staged files, runs on the whole project
