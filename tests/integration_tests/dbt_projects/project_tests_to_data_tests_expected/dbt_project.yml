name: 'dbt_autofix_tests'
version: '1.0.0'
profile: 'dbt_autofix_tests'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]
data_tests:
  +enabled: true
  dbt_autofix_tests:
    +severity: warn

clean-targets:
  - "target"
  - "dbt_packages"
flags:
  require_generic_test_arguments_property: true