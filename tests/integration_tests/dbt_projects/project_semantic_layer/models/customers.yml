# models
models: # models - inline
  - # models.[0].name
    name: customers # models.[0].name - inline
    # models.[0].description
    description: Customer overview data mart, offering key details for each unique customer. One row per customer. # models.[0].description - inline
    # models.[0].data_tests
    data_tests: # models.[0].data_tests - inline
      - # models.[0].data_tests.[0].dbt_utils.expression_is_true
        dbt_utils.expression_is_true: # models.[0].data_tests.[0].dbt_utils.expression_is_true - inline
          # models.[0].data_tests.[0].dbt_utils.expression_is_true.expression
          expression: "lifetime_spend_pretax + lifetime_tax_paid = lifetime_spend" # models.[0].data_tests.[0].dbt_utils.expression_is_true.expression - inline
    # models.[0].columns
    columns: # models.[0].columns - inline
      - # models.[0].columns.[0].name
        name: customer_id # models.[0].columns.[0].name - inline
        # models.[0].columns.[0].description
        description: The unique key of the orders mart. # models.[0].columns.[0].description - inline
        # models.[0].columns.[0].data_tests
        data_tests: # models.[0].columns.[0].data_tests - inline
          # models.[0].columns.[0].data_tests.[0]
          - not_null # models.[0].columns.[0].data_tests.[0] - inline
          # models.[0].columns.[0].data_tests.[1]
          - unique # models.[0].columns.[0].data_tests.[1] - inline
      - # models.[0].columns.[1].name
        name: customer_name # models.[0].columns.[1].name - inline
        # models.[0].columns.[1].description
        description: Customers' full name. # models.[0].columns.[1].description - inline
      - # models.[0].columns.[2].name
        name: count_lifetime_orders # models.[0].columns.[2].name - inline
        # models.[0].columns.[2].description
        description: Total number of orders a customer has ever placed. # models.[0].columns.[2].description - inline
      - # models.[0].columns.[3].name
        name: first_ordered_at # models.[0].columns.[3].name - inline
        # models.[0].columns.[3].description
        description: The timestamp when a customer placed their first order. # models.[0].columns.[3].description - inline
      - # models.[0].columns.[4].name
        name: last_ordered_at # models.[0].columns.[4].name - inline
        # models.[0].columns.[4].description
        description: The timestamp of a customer's most recent order. # models.[0].columns.[4].description - inline
      - # models.[0].columns.[5].name
        name: lifetime_spend_pretax # models.[0].columns.[5].name - inline
        # models.[0].columns.[5].description
        description: The sum of all the pre-tax subtotals of every order a customer has placed. # models.[0].columns.[5].description - inline
      - # models.[0].columns.[6].name
        name: lifetime_tax_paid # models.[0].columns.[6].name - inline
        # models.[0].columns.[6].description
        description: The sum of all the tax portion of every order a customer has placed. # models.[0].columns.[6].description - inline
      - # models.[0].columns.[7].name
        name: lifetime_spend # models.[0].columns.[7].name - inline
        # models.[0].columns.[7].description
        description: The sum of all the order totals (including tax) that a customer has ever placed. # models.[0].columns.[7].description - inline
      - # models.[0].columns.[8].name
        name: customer_type # models.[0].columns.[8].name - inline
        # models.[0].columns.[8].description
        description: Options are 'new' or 'returning', indicating if a customer has ordered more than once or has only placed their first order to date. # models.[0].columns.[8].description - inline
        # models.[0].columns.[8].data_tests
        data_tests: # models.[0].columns.[8].data_tests - inline
          - # models.[0].columns.[8].data_tests.[0].accepted_values
            accepted_values: # models.[0].columns.[8].data_tests.[0].accepted_values - inline
              # models.[0].columns.[8].data_tests.[0].accepted_values.values
              values: ["new", "returning"] # models.[0].columns.[8].data_tests.[0].accepted_values.values - inline
# semantic_models
semantic_models: # semantic_models - inline
  - # semantic_models.[0].name
    name: customers # semantic_models.[0].name - inline
    # semantic_models.[0].defaults
    defaults: # semantic_models.[0].defaults - inline
      # semantic_models.[0].defaults.agg_time_dimension
      agg_time_dimension: first_ordered_at # semantic_models.[0].defaults.agg_time_dimension - inline
    # semantic_models.[0].description
    description: |
      Customer grain mart.
    # semantic_models.[0].model
    model: ref('customers') # semantic_models.[0].model - inline
    # semantic_models.[0].entities
    entities: # semantic_models.[0].entities - inline
      - # semantic_models.[0].entities.[0].name
        name: customer # semantic_models.[0].entities.[0].name - inline
        # semantic_models.[0].entities.[0].expr
        expr: customer_id # semantic_models.[0].entities.[0].expr - inline
        # semantic_models.[0].entities.[0].type
        type: primary # semantic_models.[0].entities.[0].type - inline
    # semantic_models.[0].dimensions
    dimensions: # semantic_models.[0].dimensions - inline
      - # semantic_models.[0].dimensions.[0].name
        name: customer_name # semantic_models.[0].dimensions.[0].name - inline
        # semantic_models.[0].dimensions.[0].type
        type: categorical # semantic_models.[0].dimensions.[0].type - inline
      - # semantic_models.[0].dimensions.[1].name
        name: customer_type # semantic_models.[0].dimensions.[1].name - inline
        # semantic_models.[0].dimensions.[1].type
        type: categorical # semantic_models.[0].dimensions.[1].type - inline
      - # semantic_models.[0].dimensions.[2].name
        name: first_ordered_at # semantic_models.[0].dimensions.[2].name - inline
        # semantic_models.[0].dimensions.[2].type
        type: time # semantic_models.[0].dimensions.[2].type - inline
        # semantic_models.[0].dimensions.[2].type_params
        type_params: # semantic_models.[0].dimensions.[2].type_params - inline
          # semantic_models.[0].dimensions.[2].type_params.time_granularity
          time_granularity: day # semantic_models.[0].dimensions.[2].type_params.time_granularity - inline
      - # semantic_models.[0].dimensions.[3].name
        name: last_ordered_at # semantic_models.[0].dimensions.[3].name - inline
        # semantic_models.[0].dimensions.[3].type
        type: time # semantic_models.[0].dimensions.[3].type - inline
        # semantic_models.[0].dimensions.[3].type_params
        type_params: # semantic_models.[0].dimensions.[3].type_params - inline
          # semantic_models.[0].dimensions.[3].type_params.time_granularity
          time_granularity: day # semantic_models.[0].dimensions.[3].type_params.time_granularity - inline
    # semantic_models.[0].measures
    measures: # semantic_models.[0].measures - inline
      - # semantic_models.[0].measures.[0].name
        name: customers # semantic_models.[0].measures.[0].name - inline
        # semantic_models.[0].measures.[0].description
        description: Count of unique customers # semantic_models.[0].measures.[0].description - inline
        # semantic_models.[0].measures.[0].agg
        agg: count_distinct # semantic_models.[0].measures.[0].agg - inline
      - # semantic_models.[0].measures.[1].name
        name: count_lifetime_orders # semantic_models.[0].measures.[1].name - inline
        # semantic_models.[0].measures.[1].description
        description: Total count of orders per customer. # semantic_models.[0].measures.[1].description - inline
        # semantic_models.[0].measures.[1].agg
        agg: sum # semantic_models.[0].measures.[1].agg - inline
      - # semantic_models.[0].measures.[2].name
        name: lifetime_spend_pretax # semantic_models.[0].measures.[2].name - inline
        # semantic_models.[0].measures.[2].description
        description: Customer lifetime spend before taxes. # semantic_models.[0].measures.[2].description - inline
        # semantic_models.[0].measures.[2].agg
        agg: sum # semantic_models.[0].measures.[2].agg - inline
      - # semantic_models.[0].measures.[3].name
        name: lifetime_spend # semantic_models.[0].measures.[3].name - inline
        # semantic_models.[0].measures.[3].agg
        agg: sum # semantic_models.[0].measures.[3].agg - inline
        # semantic_models.[0].measures.[3].description
        description: Gross customer lifetime spend inclusive of taxes. # semantic_models.[0].measures.[3].description - inline
        # semantic_models.[0].measures.[3].create_metric
        create_metric: true # semantic_models.[0].measures.[3].create_metric - inline
      - # semantic_models.[0].measures.[4].name
        name: lifetime_spend_p99_discrete # semantic_models.[0].measures.[4].name - inline
        # semantic_models.[0].measures.[4].agg
        agg: percentile # semantic_models.[0].measures.[4].agg - inline
        # semantic_models.[0].measures.[4].description
        description: P99 of gross customer lifetime spend inclusive of taxes (discrete). # semantic_models.[0].measures.[4].description - inline
        # semantic_models.[0].measures.[4].agg_params
        agg_params: # semantic_models.[0].measures.[4].agg_params - inline
          # semantic_models.[0].measures.[4].agg_params.percentile
          percentile: 0.99 # semantic_models.[0].measures.[4].agg_params.percentile - inline
          # semantic_models.[0].measures.[4].agg_params.use_discrete_percentile
          use_discrete_percentile: true # semantic_models.[0].measures.[4].agg_params.use_discrete_percentile - inline
          # semantic_models.[0].measures.[4].agg_params.use_approximate_percentile
          use_approximate_percentile: false # semantic_models.[0].measures.[4].agg_params.use_approximate_percentile - inline
      - # semantic_models.[0].measures.[5].name
        name: lifetime_spend_p95_approximate # semantic_models.[0].measures.[5].name - inline
        # semantic_models.[0].measures.[5].agg
        agg: percentile # semantic_models.[0].measures.[5].agg - inline
        # semantic_models.[0].measures.[5].description
        description: P95 of gross customer lifetime spend inclusive of taxes (approximate). # semantic_models.[0].measures.[5].description - inline
        # semantic_models.[0].measures.[5].agg_params
        agg_params: # semantic_models.[0].measures.[5].agg_params - inline
          # semantic_models.[0].measures.[5].agg_params.percentile
          percentile: 0.95 # semantic_models.[0].measures.[5].agg_params.percentile - inline
          # semantic_models.[0].measures.[5].agg_params.use_approximate_percentile
          use_approximate_percentile: true # semantic_models.[0].measures.[5].agg_params.use_approximate_percentile - inline

# metrics
metrics: # metrics - inline
  - # metrics.[0].name
    name: lifetime_spend_pretax # metrics.[0].name - inline
    # metrics.[0].description
    description: Customer's lifetime spend before tax # metrics.[0].description - inline
    # metrics.[0].label
    label: LTV Pre-tax # metrics.[0].label - inline
    # metrics.[0].type
    type: simple # metrics.[0].type - inline
    # metrics.[0].type_params
    type_params: # metrics.[0].type_params - inline
      # metrics.[0].type_params.measure
      measure: lifetime_spend_pretax # metrics.[0].type_params.measure - inline
  - # metrics.[1].name
    name: count_lifetime_orders # metrics.[1].name - inline
    # metrics.[1].description
    description: Count of lifetime orders # metrics.[1].description - inline
    # metrics.[1].label
    label: Count Lifetime Orders # metrics.[1].label - inline
    # metrics.[1].type
    type: simple # metrics.[1].type - inline
    # metrics.[1].type_params
    type_params: # metrics.[1].type_params - inline
      # metrics.[1].type_params.measure
      measure: count_lifetime_orders # metrics.[1].type_params.measure - inline
  - # metrics.[2].name
    name: average_order_value # metrics.[2].name - inline
    # metrics.[2].description
    description: LTV pre-tax / number of orders # metrics.[2].description - inline
    # metrics.[2].label
    label: Average Order Value # metrics.[2].label - inline
    # metrics.[2].type
    type: derived # metrics.[2].type - inline
    # metrics.[2].type_params
    type_params: # metrics.[2].type_params - inline
      # metrics.[2].type_params.metrics
      metrics: # metrics.[2].type_params.metrics - inline
        # metrics.[2].type_params.metrics.[0]
        - count_lifetime_orders # metrics.[2].type_params.metrics.[0] - inline
        # metrics.[2].type_params.metrics.[1]
        - lifetime_spend_pretax # metrics.[2].type_params.metrics.[1] - inline
      # metrics.[2].type_params.expr
      expr: lifetime_spend_pretax / count_lifetime_orders # metrics.[2].type_params.expr - inline

