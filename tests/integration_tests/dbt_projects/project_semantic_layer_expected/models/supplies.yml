# semantic_models
models:          # semantic_models - inline
    # semantic_models.[0].name
  - name: supplies # semantic_models.[0].name - inline
    # semantic_models.[0].description
    semantic_model:
      enabled: true
    description: |
      Supplies dimension table. The grain of the table is one row per supply and product combination.
    columns:
      - name: supply_uuid
        entity:
          type: primary
          name: supply
      - name: supply_id
        dimension:
          type: categorical
      - name: product_id
        dimension:
          type: categorical
      - name: supply_name
        dimension:
          type: categorical
      - name: supply_cost
        dimension:
          type: categorical
      - name: is_perishable_supply
        dimension:
          type: categorical