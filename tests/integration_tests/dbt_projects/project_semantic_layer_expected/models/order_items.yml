        type: cumulative # metrics.[14].type - inline
    # metrics.[14].type_params
        window: 1 month
        grain_to_date: day
        period_agg: first
        input_metric:
          name: revenue_fill_nulls_with_0_join_to_timespine
          filter: cumulative_filter
