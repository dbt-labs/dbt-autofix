# models
models: # models - inline
    # models.[0].name
  - name: order_items # models.[0].name - inline
    # models.[0].columns
    columns: # models.[0].columns - inline
        # models.[0].columns.[0].name
      - name: order_item_id # models.[0].columns.[0].name - inline
        # models.[0].columns.[0].data_tests
        data_tests: # models.[0].columns.[0].data_tests - inline
          # models.[0].columns.[0].data_tests.[0]
          - not_null # models.[0].columns.[0].data_tests.[0] - inline
          # models.[0].columns.[0].data_tests.[1]
          - unique # models.[0].columns.[0].data_tests.[1] - inline
        # models.[0].columns.[1].name
        entity:
          type: primary
          name: order_item
      - name: order_id # models.[0].columns.[1].name - inline
        # models.[0].columns.[1].data_tests
        data_tests: # models.[0].columns.[1].data_tests - inline
            # models.[0].columns.[1].data_tests.[0].relationships
          - relationships: # models.[0].columns.[1].data_tests.[0].relationships - inline
              # models.[0].columns.[1].data_tests.[0].relationships.to
              to: ref('orders') # models.[0].columns.[1].data_tests.[0].relationships.to - inline
              # models.[0].columns.[1].data_tests.[0].relationships.field
              field: order_id # models.[0].columns.[1].data_tests.[0].relationships.field - inline
        entity:
          type: foreign
      - name: product_id
        entity:
          type: foreign
          name: product
      - name: ordered_at
        dimension:
          type: time
        granularity: day
      - name: is_food_item
        dimension:
          type: categorical
      - name: is_drink_item
        dimension:
          type: categorical
    semantic_model:
      enabled: true
      name: order_items
    description: |
      Items contatined in each order. The grain of the table is one row per order item.
    agg_time_dimension: ordered_at
# semantic_models
    metrics:
    # metrics.[0].name
      - name: revenue # metrics.[0].name - inline
    # metrics.[0].description
        description: Sum of the product revenue for each order item. Excludes tax. # metrics.[0].description - inline
    # metrics.[0].type
        type: simple # metrics.[0].type - inline
    # metrics.[0].label
        label: Revenue # metrics.[0].label - inline
        config:
          tags: [deprecated_tag_1, deprecated_tag_2] # metrics.[0].tags - inline
    # metrics.[0].type_params
        agg: sum
        expr: product_price
    # metrics.[1].name
      - name: revenue_with_stacked_filters # metrics.[1].name - inline
    # metrics.[1].description
        description: Sum of the product revenue for each order item. Excludes tax. # metrics.[1].description - inline
    # metrics.[1].type
        type: simple # metrics.[1].type - inline
    # metrics.[1].label
        label: Revenue # metrics.[1].label - inline
    # metrics.[1].filter
        filter: (revenue_filter_on_metric_itself) AND (revenue_filter_on_input) # metrics.[1].filter - inline

    # metrics.[1].tags
        config: # metrics.[1].config - inline
      # metrics.[1].config.tags
          tags: [deprecated_tag_1, deprecated_tag_2, normal_tag_1, normal_tag_2] # metrics.[1].config.tags - inline
        agg: sum
        expr: product_price
    # metrics.[3].name
      - name: median_revenue # metrics.[3].name - inline
    # metrics.[3].description
        description: The median revenue for each order item. Excludes tax. # metrics.[3].description - inline
    # metrics.[3].type
        type: simple # metrics.[3].type - inline
    # metrics.[3].label
        label: Median Revenue # metrics.[3].label - inline
        agg: median
        expr: product_price
    # metrics.[4].name
      - name: food_revenue # metrics.[4].name - inline
    # metrics.[4].description
        description: The revenue from food in each order # metrics.[4].description - inline
    # metrics.[4].label
        label: Food Revenue # metrics.[4].label - inline
    # metrics.[4].type
        type: simple # metrics.[4].type - inline
        agg: sum
        expr: case when is_food_item is true then product_price else 0 end
    # metrics.[5].name
      - name: drink_revenue # metrics.[5].name - inline
    # metrics.[5].description
        description: The revenue from drinks in each order # metrics.[5].description - inline
    # metrics.[5].label
        label: Drink Revenue # metrics.[5].label - inline
    # metrics.[5].type
        type: simple # metrics.[5].type - inline
        agg: sum
        expr: case when is_drink_item is true then product_price else 0 end
    # metrics.[6].name
      - name: food_revenue_pct # metrics.[6].name - inline
    # metrics.[6].description
        description: The % of order revenue from food. # metrics.[6].description - inline
    # metrics.[6].label
        label: Food Revenue % # metrics.[6].label - inline
    # metrics.[6].type
        type: ratio # metrics.[6].type - inline
    # metrics.[6].type_params
        numerator: food_revenue
        denominator: revenue
    # metrics.[7].name
      - name: drink_revenue_pct # metrics.[7].name - inline
    # metrics.[7].description
        description: The % of order revenue from drinks. # metrics.[7].description - inline
    # metrics.[7].label
        label: Drink Revenue % # metrics.[7].label - inline
    # metrics.[7].type
        type: ratio # metrics.[7].type - inline
    # metrics.[7].type_params
        numerator: drink_revenue
        denominator: revenue
    # metrics.[8].name
      - name: drink_revenue_pct_wtih_complex_args # metrics.[8].name - inline
    # metrics.[8].description
        description: The % of order revenue from drinks. # metrics.[8].description - inline
    # metrics.[8].label
        label: Drink Revenue % # metrics.[8].label - inline
    # metrics.[8].type
        type: ratio # metrics.[8].type - inline
    # metrics.[8].type_params
        numerator: # metrics.[8].type_params.numerator - inline
        # metrics.[8].type_params.numerator.name
          name: drink_revenue # metrics.[8].type_params.numerator.name - inline
        # metrics.[8].type_params.numerator.filter
          filter: drink_revenue > 0 # metrics.[8].type_params.numerator.filter - inline
        # metrics.[8].type_params.numerator.alias
          alias: drink_revenue_filtered # metrics.[8].type_params.numerator.alias - inline
      # metrics.[8].type_params.denominator
        denominator: # metrics.[8].type_params.denominator - inline
        # metrics.[8].type_params.denominator.name
          name: revenue # metrics.[8].type_params.denominator.name - inline
        # metrics.[8].type_params.denominator.filter
          filter: revenue > 0 # metrics.[8].type_params.denominator.filter - inline
        # metrics.[8].type_params.denominator.alias
          alias: revenue_filtered # metrics.[8].type_params.denominator.alias - inline

    # metrics.[9].name
      - name: revenue_growth_mom # metrics.[9].name - inline
    # metrics.[9].description
        description: "Percentage growth of revenue compared to 1 month ago. Excluded tax" # metrics.[9].description - inline
    # metrics.[9].type
        type: derived # metrics.[9].type - inline
    # metrics.[9].label
        label: Revenue Growth % M/M # metrics.[9].label - inline
    # metrics.[9].type_params
        expr: (current_revenue - revenue_prev_month)*100/revenue_prev_month
        input_metrics:
          - name: revenue # metrics.[9].type_params.metrics.[0].name - inline
          # metrics.[9].type_params.metrics.[0].alias
            alias: current_revenue # metrics.[9].type_params.metrics.[0].alias - inline
          - name: revenue # metrics.[9].type_params.metrics.[1].name - inline
          # metrics.[9].type_params.metrics.[1].offset_window
            offset_window: 1 month # metrics.[9].type_params.metrics.[1].offset_window - inline
          # metrics.[9].type_params.metrics.[1].alias
            alias: revenue_prev_month # metrics.[9].type_params.metrics.[1].alias - inline
        # semantic_models.[0].measures.[0].name
      - name: revenue_1 # semantic_models.[0].measures.[0].name - inline
        # semantic_models.[0].measures.[0].description
        description: The revenue generated for each order item. Revenue is calculated as a sum of revenue associated with each product in an order. # semantic_models.[0].measures.[0].description - inline
        # semantic_models.[0].measures.[0].agg
        agg: sum # semantic_models.[0].measures.[0].agg - inline
        # semantic_models.[0].measures.[0].expr
        expr: product_price # semantic_models.[0].measures.[0].expr - inline
        # semantic_models.[0].measures.[0].config
        config: # semantic_models.[0].measures.[0].config - inline
          # semantic_models.[0].measures.[0].config.meta
          meta: # semantic_models.[0].measures.[0].config.meta - inline
            # semantic_models.[0].measures.[0].config.meta.label_in_meta
            label_in_meta: text in meta # semantic_models.[0].measures.[0].config.meta.label_in_meta - inline
        type: simple
        hidden: true
    # metrics.[13].name
      - name: cumulative_revenue # metrics.[13].name - inline
    # metrics.[13].description
        description: The cumulative revenue for all orders. # metrics.[13].description - inline
    # metrics.[13].label
        label: Cumulative Revenue (All Time) # metrics.[13].label - inline
    # metrics.[13].type
        type: cumulative # metrics.[13].type - inline
    # metrics.[13].type_params
        input_metric: revenue_1
    # metrics.[12].name
