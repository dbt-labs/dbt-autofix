    # metrics.[12].type_params
        expr: current_revenue / cumulative_revenue
        input_metrics:
          - name: revenue # metrics.[12].type_params.metrics.[0].name - inline
          # metrics.[12].type_params.metrics.[0].alias
            alias: current_revenue # metrics.[12].type_params.metrics.[0].alias - inline
        # metrics.[12].type_params.metrics.[1]
          - name: cumulative_revenue
        # semantic_models.[0].measures.[0].name
      - name: revenue_fill_nulls_with_0_join_to_timespine # semantic_models.[0].measures.[0].name - inline
        # semantic_models.[0].measures.[0].description
