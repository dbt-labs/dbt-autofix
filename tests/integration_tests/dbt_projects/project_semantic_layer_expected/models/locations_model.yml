# models
models: # models - inline
    # models.[0].name
  - name: locations # models.[0].name - inline
    semantic_model:
      enabled: true
    description: |
      Location dimension table. The grain of the table is one row per location.
    agg_time_dimension: opened_at
    columns:
      - name: location_id
        entity:
          type: primary
          name: location
      - name: location_name
        dimension:
          type: categorical
      - name: opened_at
        dimension:
          type: time
        granularity: day
    derived_semantics:
      entities:
        - name: not_mergeable_entity
          type: categorical
          expr: location + " " + location_name
      dimensions:
        - name: my_complex_dimension
          type: categorical
          expr: CONCAT(location_name, ' ', opened_at)
        - name: my_complex_dimension_with_granularity
          type: categorical
          granularity: day
          expr: CONCAT(location_name, ' ', opened_at)
    metrics:
        # semantic_models.[0].measures.[0].name
      - name: average_tax_rate # semantic_models.[0].measures.[0].name - inline
        # semantic_models.[0].measures.[0].description
        description: Average tax rate. # semantic_models.[0].measures.[0].description - inline
        # semantic_models.[0].measures.[0].expr
        expr: tax_rate # semantic_models.[0].measures.[0].expr - inline
        # semantic_models.[0].measures.[0].agg
        agg: average # semantic_models.[0].measures.[0].agg - inline
        type: simple
        hidden: true
        # semantic_models.[0].measures.[0].name
      - name: average_tax_rate_fill_nulls_with_8675309 # semantic_models.[0].measures.[0].name - inline
        # semantic_models.[0].measures.[0].description
        description: Average tax rate. # semantic_models.[0].measures.[0].description - inline
        # semantic_models.[0].measures.[0].expr
        expr: tax_rate # semantic_models.[0].measures.[0].expr - inline
        # semantic_models.[0].measures.[0].agg
        agg: average # semantic_models.[0].measures.[0].agg - inline
        type: simple
        hidden: true
        fill_nulls_with: 8675309