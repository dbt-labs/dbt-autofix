# models
models: # models - inline
    # models.[0].name
  - name: orders # models.[0].name - inline
    # models.[0].description
    description: "Order overview data mart, offering key details for each order inlcluding if it's a customer's first order and a food vs. drink item breakdown. One row per order. Order fact table. This table is at the order grain with one row per order.\n" # models.[0].description - inline
    # models.[0].data_tests
    data_tests: # models.[0].data_tests - inline
        # models.[0].data_tests.[0].dbt_utils.expression_is_true
      - dbt_utils.expression_is_true: # models.[0].data_tests.[0].dbt_utils.expression_is_true - inline
          # models.[0].data_tests.[0].dbt_utils.expression_is_true.expression
          expression: "order_items_subtotal = subtotal" # models.[0].data_tests.[0].dbt_utils.expression_is_true.expression - inline
        # models.[0].data_tests.[1].dbt_utils.expression_is_true
      - dbt_utils.expression_is_true: # models.[0].data_tests.[1].dbt_utils.expression_is_true - inline
          # models.[0].data_tests.[1].dbt_utils.expression_is_true.expression
          expression: "order_total = subtotal + tax_paid" # models.[0].data_tests.[1].dbt_utils.expression_is_true.expression - inline
    # models.[0].columns
    columns: # models.[0].columns - inline
        # models.[0].columns.[0].name
      - name: order_id # models.[0].columns.[0].name - inline
        # models.[0].columns.[0].description
        description: The unique key of the orders mart. # models.[0].columns.[0].description - inline
        # models.[0].columns.[0].data_tests
        data_tests: # models.[0].columns.[0].data_tests - inline
          # models.[0].columns.[0].data_tests.[0]
          - not_null # models.[0].columns.[0].data_tests.[0] - inline
          # models.[0].columns.[0].data_tests.[1]
          - unique # models.[0].columns.[0].data_tests.[1] - inline
        entity:
          type: primary
        # models.[0].columns.[1].name
      - name: customer_id # models.[0].columns.[1].name - inline
        # models.[0].columns.[1].description
        description: The foreign key relating to the customer who placed the order. # models.[0].columns.[1].description - inline
        # models.[0].columns.[1].data_tests
        data_tests: # models.[0].columns.[1].data_tests - inline
            # models.[0].columns.[1].data_tests.[0].relationships
          - relationships: # models.[0].columns.[1].data_tests.[0].relationships - inline
              # models.[0].columns.[1].data_tests.[0].relationships.to
              to: ref('stg_customers') # models.[0].columns.[1].data_tests.[0].relationships.to - inline
              # models.[0].columns.[1].data_tests.[0].relationships.field
              field: customer_id # models.[0].columns.[1].data_tests.[0].relationships.field - inline
        entity:
          type: foreign
          name: customer
        # models.[0].columns.[2].name
      - name: order_total # models.[0].columns.[2].name - inline
        # models.[0].columns.[2].description
        description: The total amount of the order in USD including tax. # models.[0].columns.[2].description - inline
        dimension:
          type: categorical
          name: order_total_dim
        # models.[0].columns.[3].name
      - name: ordered_at # models.[0].columns.[3].name - inline
        # models.[0].columns.[3].description
        description: The timestamp the order was placed at. # models.[0].columns.[3].description - inline
        dimension:
          type: time
        granularity: day
        # models.[0].columns.[4].name
      - name: order_cost # models.[0].columns.[4].name - inline
        # models.[0].columns.[4].description
        description: The sum of supply expenses to fulfill the order. # models.[0].columns.[4].description - inline
        # models.[0].columns.[5].name
      - name: is_food_order # models.[0].columns.[5].name - inline
        # models.[0].columns.[5].description
        description: A boolean indicating if this order included any food items. # models.[0].columns.[5].description - inline
        dimension:
          type: categorical
        # models.[0].columns.[6].name
      - name: is_drink_order # models.[0].columns.[6].name - inline
        # models.[0].columns.[6].description
        description: A boolean indicating if this order included any drink items. # models.[0].columns.[6].description - inline
        dimension:
          type: categorical
      - name: location_id
        entity:
          type: foreign
          name: location
      - name: customer_order_number
        dimension:
          type: categorical
    semantic_model:
      enabled: true
    agg_time_dimension: ordered_at
# semantic_models
    metrics:
    # metrics.[2].name
      - name: order_cost # metrics.[2].name - inline
    # metrics.[2].description
        description: Sum of cost for each order item. # metrics.[2].description - inline
    # metrics.[2].label
        label: Order Cost # metrics.[2].label - inline
    # metrics.[2].type
        type: simple # metrics.[2].type - inline
        agg: sum
    # metrics.[0].name
      - name: order_total # metrics.[0].name - inline
    # metrics.[0].description
        description: Sum of total order amonunt. Includes tax + revenue. # metrics.[0].description - inline
    # metrics.[0].type
        type: simple # metrics.[0].type - inline
    # metrics.[0].label
        label: Order Total # metrics.[0].label - inline
        agg: sum
    # metrics.[1].name
      - name: new_customer_orders # metrics.[1].name - inline
    # metrics.[1].description
        description: New customer's first order count # metrics.[1].description - inline
    # metrics.[1].label
        label: New Customers # metrics.[1].label - inline
    # metrics.[1].type
        type: simple # metrics.[1].type - inline
    # metrics.[1].filter
        filter: |
          {{ Dimension('order_id__customer_order_number') }} = 1
        agg: sum
        expr: 1
    # metrics.[2].name
      - name: large_orders # metrics.[2].name - inline
    # metrics.[2].description
        description: "Count of orders with order total over 20." # metrics.[2].description - inline
    # metrics.[2].type
        type: simple # metrics.[2].type - inline
    # metrics.[2].label
        label: Large Orders # metrics.[2].label - inline
    # metrics.[2].filter
        filter: |
          {{ Dimension('order_id__order_total_dim') }} >= 20
        agg: sum
        expr: 1
    # metrics.[3].name
      - name: orders # metrics.[3].name - inline
    # metrics.[3].description
        description: Count of orders. # metrics.[3].description - inline
    # metrics.[3].label
        label: Orders # metrics.[3].label - inline
    # metrics.[3].type
        type: simple # metrics.[3].type - inline
        agg: sum
        expr: 1
    # metrics.[4].name
      - name: food_orders # metrics.[4].name - inline
    # metrics.[4].description
        description: Count of orders that contain food order items # metrics.[4].description - inline
    # metrics.[4].label
        label: Food Orders # metrics.[4].label - inline
    # metrics.[4].type
        type: simple # metrics.[4].type - inline
    # metrics.[4].filter
        filter: |
          {{ Dimension('order_id__is_food_order') }} = true
        agg: sum
        expr: 1
    # metrics.[5].name
      - name: drink_orders # metrics.[5].name - inline
    # metrics.[5].description
        description: Count of orders that contain drink order items # metrics.[5].description - inline
    # metrics.[5].label
        label: Drink Orders # metrics.[5].label - inline
    # metrics.[5].type
        type: simple # metrics.[5].type - inline
    # metrics.[5].filter
        filter: |
          {{ Dimension('order_id__is_drink_order') }} = true
# saved_queries
        agg: sum
        expr: 1
        # semantic_models.[0].measures.[2].name
      - name: tax_paid # semantic_models.[0].measures.[2].name - inline
        # semantic_models.[0].measures.[2].description
        description: The total tax paid on each order. # semantic_models.[0].measures.[2].description - inline
        # semantic_models.[0].measures.[2].agg
        agg: sum # semantic_models.[0].measures.[2].agg - inline
        type: simple
        hidden: true
saved_queries: # saved_queries - inline
    # saved_queries.[0].name
  - name: order_metrics # saved_queries.[0].name - inline
    # saved_queries.[0].query_params
    query_params: # saved_queries.[0].query_params - inline
      # saved_queries.[0].query_params.metrics
      metrics: # saved_queries.[0].query_params.metrics - inline
        # saved_queries.[0].query_params.metrics.[0]
        - orders # saved_queries.[0].query_params.metrics.[0] - inline
        # saved_queries.[0].query_params.metrics.[1]
        - new_customer_orders # saved_queries.[0].query_params.metrics.[1] - inline
        # saved_queries.[0].query_params.metrics.[2]
        - order_total # saved_queries.[0].query_params.metrics.[2] - inline
        # saved_queries.[0].query_params.metrics.[3]
        - food_orders # saved_queries.[0].query_params.metrics.[3] - inline
        # saved_queries.[0].query_params.metrics.[4]
        - drink_orders # saved_queries.[0].query_params.metrics.[4] - inline
      # saved_queries.[0].query_params.group_by
      group_by: # saved_queries.[0].query_params.group_by - inline
        # saved_queries.[0].query_params.group_by.[0]
        - TimeDimension('metric_time', 'day') # saved_queries.[0].query_params.group_by.[0] - inline
    # saved_queries.[0].exports
    exports: # saved_queries.[0].exports - inline
        # saved_queries.[0].exports.[0].name
      - name: order_metrics # saved_queries.[0].exports.[0].name - inline
        # saved_queries.[0].exports.[0].config
        config: # saved_queries.[0].exports.[0].config - inline
          # saved_queries.[0].exports.[0].config.export_as
          export_as: table # saved_queries.[0].exports.[0].config.export_as - inline