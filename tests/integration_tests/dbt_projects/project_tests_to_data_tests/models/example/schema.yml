models:
  - name: my_model
    tests:
      - unique
    columns:
      - name: id
        tests:
          - unique
          - not_null
      - name: name
        data_tests:
          - not_null

sources:
  - name: my_source
    schema: raw
    tables:
      - name: my_table
        tests:
          - unique
        columns:
          - name: id
            tests:
              - not_null
